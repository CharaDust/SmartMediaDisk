<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="bkgpic.css" rel="stylesheet">
    <title>收件箱 - Media Cube</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <!--# include virtual="/innerHTML/nav.html" -->

    <main class="container py-4">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
            <div>
                <h1 class="h3 mb-1">收件箱</h1>
                <div class="text-secondary small">查看内部邮件，并把附件保存到自己的网盘。</div>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary" id="mail-refresh-button" type="button">
                    <i class="bi bi-arrow-clockwise"></i>
                    刷新
                </button>
                <a class="btn btn-dark" href="/page/form.html">
                    <i class="bi bi-send"></i>
                    发送邮件
                </a>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-2">
            <span id="mail-inbox-status" class="small text-secondary"></span>
        </div>

        <div class="table-responsive bg-body">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th scope="col" style="width: 56px;"></th>
                        <th scope="col">发件人</th>
                        <th scope="col">主题</th>
                        <th scope="col">附件</th>
                        <th scope="col">时间</th>
                    </tr>
                </thead>
                <tbody id="mail-inbox-body">
                    <tr>
                        <td colspan="5" class="text-center text-secondary py-4">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div class="modal fade" id="mail-detail-modal" tabindex="-1" aria-labelledby="mail-detail-subject" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h2 class="modal-title fs-5" id="mail-detail-subject">邮件详情</h2>
                        <div class="small text-secondary" id="mail-detail-meta"></div>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body">
                    <dl class="row small">
                        <dt class="col-sm-2">收件人</dt>
                        <dd class="col-sm-10" id="mail-detail-to">-</dd>
                        <dt class="col-sm-2">抄送</dt>
                        <dd class="col-sm-10" id="mail-detail-cc">-</dd>
                        <dt class="col-sm-2">密送</dt>
                        <dd class="col-sm-10" id="mail-detail-bcc">-</dd>
                    </dl>
                    <pre class="bg-body-tertiary border rounded p-3 overflow-auto"><code id="mail-detail-body"></code></pre>
                    <h3 class="h6 mt-4">附件</h3>
                    <div class="table-responsive">
                        <table class="table table-sm table-hover align-middle">
                            <thead>
                                <tr>
                                    <th scope="col">文件名</th>
                                    <th scope="col">大小</th>
                                    <th scope="col">类型</th>
                                    <th scope="col" class="text-end">操作</th>
                                </tr>
                            </thead>
                            <tbody id="mail-detail-attachments">
                                <tr>
                                    <td colspan="4" class="text-center text-secondary py-3">无附件</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-dark" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api/sendmail.js"></script>
    <script src="/js/mail-inbox.js"></script>
</body>

</html>
