<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="bkgpic.css" rel="stylesheet">
    <link href="css/layout.css" rel="stylesheet">
    <title>文件管理 - Media Cube</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .storage-overview {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(15, 23, 42, 0.08);
        }

        .storage-metric-label {
            color: #64748b;
            font-size: 0.78rem;
        }

        .storage-metric-value {
            font-weight: 600;
        }

        .audio-waveform {
            background: #f8fafc;
            height: 150px;
            width: 100%;
        }

        .media-floating-player {
            bottom: 1rem;
            left: 1rem;
            max-width: min(22rem, calc(100vw - 2rem));
            z-index: 1080;
        }

        .media-floating-player .btn {
            box-shadow: 0 0.75rem 2rem rgba(15, 23, 42, 0.2);
        }

        .media-floating-title {
            max-width: 13rem;
        }
    </style>
</head>

<body class="m-0 border-0 bd-example">
    <!--# include virtual="/innerHTML/nav.html" -->

    <div class="overlay fixed-top"></div>
    <main class="container py-4">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
            <div>
                <h1 class="h3 mb-1">文件管理</h1>
                <div class="text-secondary small" id="files-current-path">/</div>
            </div>
            <button class="btn btn-outline-secondary" id="files-up-button" type="button">
                <i class="bi bi-arrow-up"></i>
                上一级
            </button>
        </div>

        <nav aria-label="文件路径">
            <ol class="breadcrumb" id="files-breadcrumb"></ol>
        </nav>

        <section class="storage-overview rounded-2 p-3 mb-3" aria-label="容量概览">
            <div class="d-flex flex-wrap justify-content-between gap-3 mb-2">
                <div>
                    <div class="storage-metric-label">容量</div>
                    <div class="storage-metric-value" id="storage-quota">-</div>
                </div>
                <div>
                    <div class="storage-metric-label">已用</div>
                    <div class="storage-metric-value" id="storage-used">-</div>
                </div>
                <div>
                    <div class="storage-metric-label">剩余</div>
                    <div class="storage-metric-value" id="storage-available">-</div>
                </div>
                <div class="d-none" id="storage-global-logical-wrap">
                    <div class="storage-metric-label">全部文件占用</div>
                    <div class="storage-metric-value" id="storage-global-logical">-</div>
                </div>
                <div class="d-none" id="storage-global-physical-wrap">
                    <div class="storage-metric-label">实际占用</div>
                    <div class="storage-metric-value" id="storage-global-physical">-</div>
                </div>
            </div>
            <div class="progress" role="progressbar" aria-label="容量使用率" aria-valuemin="0" aria-valuemax="100">
                <div class="progress-bar" id="storage-progress" style="width: 0%">0%</div>
            </div>
        </section>

        <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
            <input class="d-none" id="file-upload-input" type="file">
            <button class="btn btn-dark text-nowrap" id="file-upload-button" type="button">
                <i class="bi bi-upload"></i>
                上传文件
            </button>
            <button class="btn btn-outline-dark text-nowrap" id="directory-create-button" type="button">
                <i class="bi bi-folder-plus"></i>
                新建目录
            </button>
            <div class="ms-lg-auto flex-grow-1 flex-lg-grow-0" style="min-width: 260px;">
                <label class="visually-hidden" for="files-search-input">搜索</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-search"></i>
                    </span>
                    <input class="form-control" id="files-search-input" type="search" placeholder="搜索" autocomplete="off">
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-2">
            <span id="files-status" class="small text-secondary"></span>
        </div>

        <div class="table-responsive bg-body">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th scope="col">名称</th>
                        <th scope="col">类型</th>
                        <th scope="col">大小</th>
                        <th scope="col">所有者</th>
                        <th scope="col">更新时间</th>
                        <th scope="col" class="text-end">操作</th>
                    </tr>
                </thead>
                <tbody id="files-table-body">
                    <tr>
                        <td colspan="6" class="text-center text-secondary py-4">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div class="modal fade" id="file-preview-modal" tabindex="-1" aria-labelledby="file-preview-title" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h2 class="modal-title fs-5" id="file-preview-title">文件预览</h2>
                        <div class="small text-secondary" id="file-preview-meta"></div>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body">
                    <pre class="bg-body-tertiary border rounded p-3 mb-0 overflow-auto" id="file-preview-text"><code id="file-preview-content"></code></pre>
                    <div class="text-center d-none" id="file-preview-image-wrap">
                        <img class="img-fluid rounded border" id="file-preview-image" alt="文件预览">
                    </div>
                    <div class="table-responsive d-none" id="file-preview-csv-wrap">
                        <table class="table table-sm table-striped table-hover align-middle mb-0">
                            <thead id="file-preview-csv-head"></thead>
                            <tbody id="file-preview-csv-body"></tbody>
                        </table>
                    </div>
                    <div class="d-none" id="file-preview-audio-wrap">
                        <canvas class="audio-waveform border rounded mb-3" id="file-preview-audio-waveform"></canvas>
                        <div class="small text-secondary mb-2" id="file-preview-audio-status"></div>
                        <audio class="w-100" id="file-preview-audio" controls preload="metadata"></audio>
                    </div>
                    <div class="d-none" id="file-preview-pdf-wrap">
                        <iframe class="w-100 border rounded" id="file-preview-pdf" title="PDF 预览" style="height: 70vh;"></iframe>
                    </div>
                </div>
                <div class="modal-footer">
                    <a class="btn btn-outline-secondary" id="file-preview-download" href="#">
                        <i class="bi bi-download"></i>
                        下载
                    </a>
                    <button type="button" class="btn btn-dark" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <div class="media-floating-player position-fixed d-none" id="media-floating-player">
        <button class="btn btn-dark d-flex align-items-center gap-3 px-3 py-2" id="media-floating-button" type="button">
            <i class="bi bi-music-note-beamed fs-4"></i>
            <span class="text-start overflow-hidden">
                <span class="d-block small text-white-50">正在播放</span>
                <span class="d-block text-truncate media-floating-title" id="media-floating-title">音频</span>
            </span>
            <span class="badge text-bg-light" id="media-floating-time">0:00</span>
        </button>
    </div>

    <script src="/js/api/files.js"></script>
    <script src="/js/api/sendmail.js"></script>
    <script src="/js/files-page.js"></script>
</body>

</html>
