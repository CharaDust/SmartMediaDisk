<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="/bkgpic.css" rel="stylesheet">
    <title>发送邮件 - Media Cube</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <!--# include virtual="/innerHTML/nav.html" -->

    <div class="overlay fixed-top"></div>
    <main class="container py-4">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
            <div>
                <h1 class="h3 mb-1">发送邮件</h1>
                <div class="text-secondary small">内部分享通过本地邮件账号发送留言和附件。</div>
            </div>
            <a class="btn btn-outline-secondary" href="/mail-inbox.html">
                <i class="bi bi-inbox"></i>
                收件箱
            </a>
        </div>

        <form id="mail-compose-form">
            <datalist id="mail-user-options"></datalist>

            <div class="mb-3">
                <label for="mail-to" class="form-label">主要收件人</label>
                <input type="text" class="form-control" id="mail-to" list="mail-user-options" placeholder="user@local; another@local">
                <div class="form-text">多个本地账号用分号分隔。</div>
            </div>

            <div class="row g-3">
                <div class="col-12 col-lg-6">
                    <label for="mail-cc" class="form-label">抄送</label>
                    <input type="text" class="form-control" id="mail-cc" list="mail-user-options" placeholder="name@local">
                    <div class="form-text">所有收件人将看到抄送名单。</div>
                </div>
                <div class="col-12 col-lg-6">
                    <label for="mail-bcc" class="form-label">密送</label>
                    <input type="text" class="form-control" id="mail-bcc" list="mail-user-options" placeholder="name@local">
                    <div class="form-text">密送收件人只会看到自己。</div>
                </div>
            </div>

            <div class="mb-3 mt-3">
                <label for="mail-subject" class="form-label">主题</label>
                <input type="text" class="form-control" id="mail-subject" maxlength="255" placeholder="邮件主题">
            </div>

            <div class="mb-3">
                <label class="form-label">文件</label>
                <div class="d-grid gap-2">
                    <button class="btn btn-primary" id="mail-pick-files-button" type="button">
                        <i class="bi bi-folder2-open"></i>
                        在资料库中选择文件以添加
                    </button>
                    <div class="table-responsive">
                        <table class="table table-striped align-middle">
                            <thead>
                                <tr>
                                    <th scope="col">序列</th>
                                    <th scope="col">文件名</th>
                                    <th scope="col">大小</th>
                                    <th scope="col">修改日期</th>
                                    <th scope="col" class="text-end">操作</th>
                                </tr>
                            </thead>
                            <tbody id="mail-attachments-body">
                                <tr>
                                    <td colspan="5" class="text-center text-secondary py-4">还没有文件</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="mail-body" class="form-label">留言</label>
                <textarea class="form-control" id="mail-body" rows="5"></textarea>
            </div>

            <div class="d-flex align-items-center justify-content-between gap-3">
                <span id="mail-compose-status" class="small text-secondary"></span>
                <button type="submit" class="btn btn-dark">
                    <i class="bi bi-send"></i>
                    发送
                </button>
            </div>
        </form>
    </main>

    <div class="modal fade" id="mail-file-picker-modal" tabindex="-1" aria-labelledby="mail-file-picker-title" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h2 class="modal-title fs-5" id="mail-file-picker-title">选择附件</h2>
                        <div class="small text-secondary" id="mail-file-picker-path">/</div>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <button class="btn btn-sm btn-outline-secondary" id="mail-file-picker-up" type="button">
                            <i class="bi bi-arrow-up"></i>
                            上一级
                        </button>
                        <span class="small text-secondary" id="mail-file-picker-status"></span>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th scope="col" style="width: 48px;"></th>
                                    <th scope="col">名称</th>
                                    <th scope="col">类型</th>
                                    <th scope="col">大小</th>
                                </tr>
                            </thead>
                            <tbody id="mail-file-picker-body">
                                <tr>
                                    <td colspan="4" class="text-center text-secondary py-4">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-dark" id="mail-file-picker-add">添加所选文件</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api/files.js"></script>
    <script src="/js/api/sendmail.js"></script>
    <script src="/js/mail-compose.js"></script>
</body>

</html>
