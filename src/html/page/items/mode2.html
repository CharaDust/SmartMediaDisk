<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mode 2</title>
    <!-- 引入 Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            padding: 20px;
        }
        .triangle-container {
            text-align: center;
            margin-top: 50px;
            position: relative;
        }
        .triangle {
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 100px solid #007bff;
            margin: 0 auto;
            transition: transform 0.1s ease; /* 平滑过渡 */
        }
        .control-panel {
            margin-top: 30px;
        }
        .control-group {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <h2 class="mb-4">Mode 2 - 三角形控制</h2>

    <!-- 控制面板 (左上部分) -->
    <div class="row control-panel">
        <div class="col-md-6">
            <div class="control-group">
                <label for="sizeSlider" class="form-label">大小:</label>
                <input type="range" class="form-range" id="sizeSlider" min="20" max="200" value="100">
                <span id="sizeValue">100px</span>
            </div>
            <div class="control-group">
                <label for="speedSlider" class="form-label">旋转速度:</label>
                <input type="range" class="form-range" id="speedSlider" min="0" max="10" step="0.1" value="1">
                <span id="speedValue">1.0x</span>
            </div>
            <div class="control-group">
                <label for="directionSelect" class="form-label">旋转方向:</label>
                <select class="form-select" id="directionSelect">
                    <option value="clockwise">顺时针</option>
                    <option value="counterClockwise">逆时针</option>
                </select>
            </div>
        </div>
    </div>

    <!-- 显示区域 (右半部分) -->
    <div class="row">
        <div class="col-md-12">
            <div class="triangle-container">
                <div id="triangle" class="triangle"></div>
            </div>
        </div>
    </div>
</div>

<script src="/js/mode2.js"></script>

</body>
</html>
