<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG颜色控制器</title>
    <!-- 引入 Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .svg-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 500px;
        }

        #svgDisplay {
            max-width: 200%;
            height: 200%;
            border: 1px solid #dee2e6;
            background-color: #ccc;
            transform: rotate(180deg) scale(400%);
        }

        .form-container {
            padding-right: 20px;
        }

        .btn-group {
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="container-fluid mt-4">
        <div class="row">
            <!-- 左侧表单 -->
            <div class="col-md-8 form-container">
                <h3>SVG 控制面板</h3>
                <form id="controlForm">
                    <!-- 标签页 -->
                    <ul class="nav nav-tabs" id="myTab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="setmodel-tab" data-bs-toggle="tab"
                                data-bs-target="#setmodel-tab-pane" type="button" role="tab"
                                aria-controls="setmodel-tab-pane" aria-selected="true">版式</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="setbkg-tab" data-bs-toggle="tab"
                                data-bs-target="#setbkg-tab-pane" type="button" role="tab"
                                aria-controls="setbkg-tab-pane" aria-selected="false">底纹</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="setdeco-tab" data-bs-toggle="tab"
                                data-bs-target="#setdeco-tab-pane" type="button" role="tab"
                                aria-controls="setdeco-tab-pane" aria-selected="false">装饰</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="disabled-tab" data-bs-toggle="tab"
                                data-bs-target="#disabled-tab-pane" type="button" role="tab"
                                aria-controls="disabled-tab-pane" aria-selected="false" disabled>文字</button>
                        </li>
                    </ul>
                    <div class="tab-content" id="myTabContent">
                        <div class="tab-pane fade show active" id="setmodel-tab-pane" role="tabpanel"
                            aria-labelledby="setmodel-tab" tabindex="0">
                            <div class="mb-3">
                                <label for="sox_length" class="form-label">配置名：</label>
                                <div class="input-group mb-3">
                                    <input type="text" id="item_name" class="form-control"
                                        aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default"
                                        placeholder="sox">
                                    <span class="input-group-text" id="inputGroup-sizing-default">.json</span>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="sox_length" class="form-label">sox长度：</label><span
                                    id="disval_sox_length">60cm</span>
                                <input type="range" class="form-control form-range" id="sox_length" min="25" max="120"
                                    value="60">
                            </div>
                            <div class="mb-3">
                                <label for="sox_model" class="form-label">版式：</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" id="sox_model_panty"
                                        value="enable_model_panty">
                                    <label class="form-check-label" for="sox_model_panty">Panty</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" id="sox_model_tabi"
                                        value="enable_model_tabi">
                                    <label class="form-check-label" for="sox_model_tabi">Tabi</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" id="sox_model_brokentest"
                                        value="enable_model_brokentest">
                                    <label class="form-check-label" for="sox_model_brokentest">All Broken(Test)</label>
                                </div>
                            </div>
                        </div>
                        <div class="tab-pane fade" id="setbkg-tab-pane" role="tabpanel" aria-labelledby="setbkg-tab"
                            tabindex="0">
                            <div class="container mb-3">
                                <ul class="nav nav-tabs" id="setbkg-inner-tablist" role="tablist">
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link active" id="setbkg-solid-tab" data-bs-toggle="tab"
                                            data-bs-target="#setbkg-solid-tab-pane" type="button" role="tab"
                                            aria-controls="setbkg-solid-tab-pane" aria-selected="true">纯色底色</button>
                                    </li>
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link" id="setbkg-stripe-tab" data-bs-toggle="tab"
                                            data-bs-target="#setbkg-stripe-tab-pane" type="button" role="tab"
                                            aria-controls="setbkg-stripe-tab-pane" aria-selected="false">条纹</button>
                                    </li>
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link" id="setbkg-grad-tab" data-bs-toggle="tab"
                                            data-bs-target="#setbkg-grad-tab-pane" type="button" role="tab"
                                            aria-controls="setbkg-grad-tab-pane" aria-selected="false">渐变</button>
                                    </li>
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link" id="setbkg-texture-tab" data-bs-toggle="tab"
                                            data-bs-target="#setbkg-texture-tab-pane" type="button" role="tab"
                                            aria-controls="setbkg-texture-tab-pane" aria-selected="false">纹理</button>
                                    </li>
                                </ul>
                                <div class="tab-content" id="setbkg-inner-tabcontent">
                                    <div class="tab-pane fade show active" id="setbkg-solid-tab-pane" role="tabpanel"
                                        aria-labelledby="setbkg-solid-tab" tabindex="0">
                                        <div class="mb-3">
                                            <label for="color_single" class="form-label">纯色底色</label>
                                            <input type="color" class="form-control" id="color_single" value="#ffffff">
                                        </div>
                                    </div>
                                    <div class="tab-pane fade" id="setbkg-stripe-tab-pane" role="tabpanel"
                                        aria-labelledby="setbkg-stripe-tab" tabindex="0">
                                        <div class="form-check mb-3">
                                            <input class="form-check-input" type="checkbox" id="bkg_strip_switch"
                                                value="1">
                                            <label class="form-check-label" for="bkg_strip_switch">使用条纹底纹</label>
                                        </div>
                                        <div class="mb-3">
                                            <label for="color_strip" class="form-label">条纹颜色</label>
                                            <input type="color" class="form-control" id="color_strip" value="#000000">
                                        </div>
                                        <div class="mb-3">
                                            <label for="color_strip_width" class="form-label">条纹宽度</label>
                                            <div class="input-group">
                                                <input type="range" class="form-control form-range"
                                                    id="color_strip_width" min="1" max="30" value="5" step="0.5">
                                                <span id="disval_color_strip_width" class="input-group-text">5</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="tab-pane fade" id="setbkg-grad-tab-pane" role="tabpanel"
                                        aria-labelledby="setbkg-grad-tab" tabindex="0">
                                        <p class="text-muted small">渐变</p>
                                    </div>
                                    <div class="tab-pane fade" id="setbkg-texture-tab-pane" role="tabpanel"
                                        aria-labelledby="setbkg-texture-tab" tabindex="0">
                                        <p class="text-muted small">纹理</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="tab-pane fade" id="setdeco-tab-pane" role="tabpanel" aria-labelledby="setdeco-tab"
                            tabindex="0">
                            <div class="container mb-3">
                                <ul class="nav nav-tabs" id="myTab" role="tablist">
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link active" id="setdecotoe-tab" data-bs-toggle="tab"
                                            data-bs-target="#setdecotoe-tab-pane" type="button" role="tab"
                                            aria-controls="setdecotoe-tab-pane" aria-selected="true">尖色块</button>
                                    </li>
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link" id="setdecostript-tab" data-bs-toggle="tab"
                                            data-bs-target="#setdecostript-tab-pane" type="button" role="tab"
                                            aria-controls="setdecostript-tab-pane" aria-selected="false">有限横向条纹</button>
                                    </li>
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link" id="setdecostep-tab" data-bs-toggle="tab"
                                            data-bs-target="#setdecostep-tab-pane" type="button" role="tab"
                                            aria-controls="setdecostep-tab-pane" aria-selected="false">脚印</button>
                                    </li>
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link" id="setdecocustom-tab" data-bs-toggle="tab"
                                            data-bs-target="#setdecocustom-tab-pane" type="button" role="tab"
                                            aria-controls="setdecocustom-tab-pane" aria-selected="false">自由图形</button>
                                    </li>
                                </ul>
                                <div class="tab-content" id="myTabContent">
                                    <div class="tab-pane fade show active" id="setdecotoe-tab-pane" role="tabpanel"
                                        aria-labelledby="setdecotoe-tab" tabindex="0">
                                        <!-- 尖色块 -->
                                        <div class="container">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="deco_toe_switch"
                                                    value="enable_toe">
                                                <label class="form-check-label" for="deco_toe_switch">使用装饰</label>
                                            </div>
                                            <div class="input-group mb-3">
                                                <span class="input-group-text">颜色</span>
                                                <input type="color" id="deco_toe_color"
                                                    class="form-control form-control-lg" value="#000000">
                                            </div>
                                            <div class="input-group mb-3">
                                                <span class="input-group-text">高度</span>
                                                <input type="range" id="deco_toe_height" class="form-control form-range"
                                                    min="0" max="20" step="0.5" value="2">
                                                <span id="disval_deco_toe_height" class="input-group-text">2.0cm</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="tab-pane fade" id="setdecostript-tab-pane" role="tabpanel"
                                        aria-labelledby="setdecostript-tab" tabindex="0">
                                        <!-- 有限横向条纹 -->
                                        <div class="container">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox"
                                                    id="deco_strip_top_switch" value="enable_toe">
                                                <label class="form-check-label" for="deco_strip_top_switch">使用装饰</label>
                                            </div>
                                            <div class="text-center">
                                                <div class="row">
                                                    <div class="col">
                                                        颜色
                                                    </div>
                                                    <div class="col">
                                                        偏移
                                                    </div>
                                                    <div class="col">
                                                        宽度
                                                    </div>
                                                </div>
                                            </div>
                                            <!-- 条纹1 -->
                                            <div class="input-group mb-3">
                                                <div class="input-group-text">
                                                    <input id="deco_strip_top_1_enable" class="form-check-input mt-0"
                                                        type="checkbox" value=""
                                                        aria-label="Checkbox for following text input" checked>
                                                </div>
                                                <input type="color" id="deco_strip_top_1_color"
                                                    class="form-control form-control-sm"
                                                    aria-label="Text input with checkbox" value="#000000">
                                                <input type="range" id="deco_strip_top_1_offset"
                                                    class="form-control form-control-sm form-range"
                                                    aria-label="Text input with checkbox" min="0" max="60" step="0.1"
                                                    value="4">
                                                <!-- <span class="input-group-text">/</span> -->
                                                <input type="range" id="deco_strip_top_1_width"
                                                    class="form-control form-control-sm form-range"
                                                    aria-label="Text input with checkbox" min="0" max="2" step="0.1"
                                                    value="1">
                                                <!-- <span class="input-group-text">cm</span> -->
                                            </div>
                                            <!-- 条纹2 -->
                                            <div class="input-group mb-3">
                                                <div class="input-group-text">
                                                    <input id="deco_strip_top_2_enable" class="form-check-input mt-0"
                                                        type="checkbox" value=""
                                                        aria-label="Checkbox for following text input" checked>
                                                </div>
                                                <input type="color" id="deco_strip_top_2_color"
                                                    class="form-control form-control-sm"
                                                    aria-label="Text input with checkbox" value="#000000">
                                                <input type="range" id="deco_strip_top_2_offset"
                                                    class="form-control form-control-sm form-range"
                                                    aria-label="Text input with checkbox" min="0" max="60" step="0.1"
                                                    value="6">
                                                <!-- <span class="input-group-text">/</span> -->
                                                <input type="range" id="deco_strip_top_2_width"
                                                    class="form-control form-control-sm form-range"
                                                    aria-label="Text input with checkbox" min="0" max="2" step="0.1"
                                                    value="1">
                                                <!-- <span class="input-group-text">cm</span> -->
                                            </div>
                                            <!-- 条纹3 -->
                                            <div class="input-group mb-3">
                                                <div class="input-group-text">
                                                    <input id="deco_strip_top_3_enable" class="form-check-input mt-0"
                                                        type="checkbox" value=""
                                                        aria-label="Checkbox for following text input" checked>
                                                </div>
                                                <input type="color" id="deco_strip_top_3_color"
                                                    class="form-control form-control-sm"
                                                    aria-label="Text input with checkbox" value="#000000">
                                                <input type="range" id="deco_strip_top_3_offset"
                                                    class="form-control form-control-sm form-range"
                                                    aria-label="Text input with checkbox" min="0" max="60" step="0.1"
                                                    value="8">
                                                <!-- <span class="input-group-text">/</span> -->
                                                <input type="range" id="deco_strip_top_3_width"
                                                    class="form-control form-control-sm form-range"
                                                    aria-label="Text input with checkbox" min="0" max="2" step="0.1"
                                                    value="1">
                                                <!-- <span class="input-group-text">cm</span> -->
                                            </div>
                                            <!-- 条纹4 -->
                                            <div class="input-group mb-3">
                                                <div class="input-group-text">
                                                    <input id="deco_strip_top_4_enable" class="form-check-input mt-0"
                                                        type="checkbox" value=""
                                                        aria-label="Checkbox for following text input">
                                                </div>
                                                <input type="color" id="deco_strip_top_4_color"
                                                    class="form-control form-control-sm"
                                                    aria-label="Text input with checkbox" value="#000000">
                                                <input type="range" id="deco_strip_top_4_offset"
                                                    class="form-control form-control-sm form-range"
                                                    aria-label="Text input with checkbox" min="0" max="60" step="0.1"
                                                    value="10">
                                                <!-- <span class="input-group-text">/</span> -->
                                                <input type="range" id="deco_strip_top_4_width"
                                                    class="form-control form-control-sm form-range"
                                                    aria-label="Text input with checkbox" min="0" max="2" step="0.1"
                                                    value="1">
                                                <!-- <span class="input-group-text">cm</span> -->
                                            </div>
                                            <label for="" class="form-label">控制：</label>
                                            <div class="form-check form-check-inline">
                                                <input class="form-check-input" type="checkbox"
                                                    id="deco_strip_top_autocolor" value="enable_model_panty">
                                                <label class="form-check-label"
                                                    for="deco_strip_top_autocolor">统一颜色</label>
                                            </div>
                                            <div class="form-check form-check-inline">
                                                <input class="form-check-input" type="checkbox"
                                                    id="deco_strip_top_autopos" value="enable_model_tabi">
                                                <label class="form-check-label"
                                                    for="deco_strip_top_autopos">整体位移</label>
                                            </div>
                                            <div class="form-check form-check-inline">
                                                <input class="form-check-input" type="checkbox"
                                                    id="deco_strip_top_autoheight" value="enable_model_brokentest">
                                                <label class="form-check-label"
                                                    for="deco_strip_top_autowidth">统一宽度</label>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="tab-pane fade" id="setdecostep-tab-pane" role="tabpanel"
                                        aria-labelledby="setdecostep-tab" tabindex="0">
                                        <div class="container">
                                            <div class="form-check mb-3">
                                                <input class="form-check-input" type="checkbox" id="deco_step_switch" value="1">
                                                <label class="form-check-label" for="deco_step_switch">使用装饰</label>
                                            </div>
                                            <div class="mb-3">
                                                <label for="deco_step_select" class="form-label">脚印</label>
                                                <select class="form-select" id="deco_step_select">
                                                    <option value="step_paw.svg">step_paw.svg</option>
                                                    <option value="step_cross.svg">step_cross.svg</option>
                                                </select>
                                            </div>
                                            <div class="mb-3">
                                                <label for="deco_step_color" class="form-label">脚印颜色</label>
                                                <input type="color" class="form-control" id="deco_step_color" value="#ffc0cb">
                                            </div>
                                            <div class="mb-3">
                                                <label for="deco_step_scale" class="form-label">缩放</label>
                                                <div class="input-group">
                                                    <input type="range" class="form-control form-range" id="deco_step_scale"
                                                        min="0.1" max="1.2" step="0.1" value="1">
                                                    <span id="disval_deco_step_scale" class="input-group-text">0.6</span>
                                                </div>
                                            </div>
                                            <div class="mb-3">
                                                <label for="deco_step_offset_y" class="form-label">纵向偏移</label>
                                                <div class="input-group">
                                                    <input type="range" class="form-control form-range" id="deco_step_offset_y"
                                                        min="3" max="20" step="0.1" value="7">
                                                    <span id="disval_deco_step_offset_y" class="input-group-text">7</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="tab-pane fade" id="setdecocustom-tab-pane" role="tabpanel"
                                        aria-labelledby="setdecocustom-tab" tabindex="0">
                                        <!-- 自由图形 -->
                                        <div class="container">
                                            <div class="form-check mb-3">
                                                <input class="form-check-input" type="checkbox" id="deco_custom_switch" value="1">
                                                <label class="form-check-label" for="deco_custom_switch">使用装饰</label>
                                            </div>
                                            <div class="btn-group mb-3" role="group">
                                                <button type="button" class="btn btn-outline-primary" id="deco_custom_add_btn">新增图形</button>
                                                <button type="button" class="btn btn-outline-secondary" id="deco_custom_clear_btn">清空图形</button>
                                                <button type="button" class="btn btn-outline-primary" id="deco_custom_update_btn">更新图形</button>
                                            </div>
                                            <div class="table-responsive">
                                                <table class="table table-sm table-bordered">
                                                    <thead>
                                                        <tr>
                                                            <th style="width:4em">序号</th>
                                                            <th>svg元素（输入框，用于编写自定义svg元素）</th>
                                                            <th style="width:12em">操作</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody id="deco_custom_tbody">
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="tab-pane fade" id="disabled-tab-pane" role="tabpanel" aria-labelledby="disabled-tab"
                            tabindex="0">...</div>
                    </div>
                    <!-- 按钮 -->
                    <div class="btn-group" role="group">
                        <button type="button" class="btn btn-primary" id="saveBtn">保存配置</button>
                        <button type="button" class="btn btn-primary" id="loadBtn">加载配置</button>
                        <button type="button" class="btn btn-primary" id="resetBtn">重置</button>
                        <button type="button" class="btn btn-primary" id="saveSvgBtn">保存SVG</button>
                    </div>
                </form>

                <div class="mt-3">
                    <h5>配置文件操作</h5>
                    <input type="file" class="form-control" id="fileInput" accept=".json">
                </div>
            </div>

            <!-- 右侧SVG显示 -->
            <div class="col-md-4">
                <h3></h3>
                <div class="svg-container">
                    <svg id="svgDisplay" width="50" height="150" xmlns="http://www.w3.org/2000/svg"
                        transform="rotate(180)">
                        <defs>
                            <!-- stok遮罩形状 -->
                            <mask height="50" width="100" y="0" x="0" id="stok">
                                <!-- 透明基底 -->
                                <rect id="trans" class="maskS" fill="black" height="80" width="100" y="0" x="0" />
                                <!-- 左后stok -->
                                <rect id="rectBL" class="maskB" fill="white" height="60" width="8" y="4" x="10" />
                                <circle id="cirBL" class="maskS" fill="white" r="4" cy="4" cx="14" />
                                <!-- 右后stok -->
                                <rect id="rectBR" class="maskB" fill="white" height="60" width="8" y="4" x="0" />
                                <circle id="cirBR" class="maskS" fill="white" r="4" cy="4" cx="4" />
                                <!-- 右前stok -->
                                <rect id="rectFR" class="maskB" fill="white" height="60" width="8" y="4" x="40" />
                                <circle id="cirFR" class="maskS" fill="white" r="4" cy="4" cx="44" />
                                <!-- 左前stok -->
                                <rect id="rectFL" class="maskB" fill="white" height="60" width="8" y="4" x="30" />
                                <circle id="cirFL" class="maskS" fill="white" r="4" cy="4" cx="34" />
                                <!-- 前panty -->
                                <rect id="ptcloF" class="maskP" fill="white" height="20" width="18" y="64" x="30"
                                    visibility="hidden" />
                                <!-- 后panty -->
                                <rect id="ptcloB" class="maskP" fill="white" height="20" width="18" y="64" x="0"
                                    visibility="hidden" />
                                <!-- 前tabi -->
                                <rect id="tabiFL" class="maskT" fill="black" height="3" width="0.4" y="0" x="33.8"
                                    visibility="hidden" />
                                <rect id="tabiFR" class="maskT" fill="black" height="3" width="0.4" y="0" x="43.8"
                                    visibility="hidden" />

        // 自由图形：动态表格
        function refreshDecoCustomRowNumbers() {
            const rows = deco_custom_tbody ? deco_custom_tbody.querySelectorAll('tr') : [];
            rows.forEach((tr, i) => {
                const idxCell = tr.querySelector('.deco_custom_index');
                if (idxCell) idxCell.textContent = i + 1;
                const btnUp = tr.querySelector('.deco_custom_btn_up');
                const btnDown = tr.querySelector('.deco_custom_btn_down');
                if (btnUp) btnUp.style.display = i === 0 ? 'none' : '';
                if (btnDown) btnDown.style.display = i === rows.length - 1 ? 'none' : '';
            });
        }

        // 底纹条纹：根据总开关、颜色、宽度实时生成 rect（y=0,2w,4w,... height=w, class="sox bkg stripC"）
        function update_bkg_strip() {
            if (!bkgStripContainer) return;
            while (bkgStripContainer.firstChild) bkgStripContainer.removeChild(bkgStripContainer.firstChild);
            const w = parseFloat(color_strip_width && color_strip_width.value) || 5;

            if (!bkg_strip_switch || !bkg_strip_switch.checked) return;
            const fillColor = color_strip && color_strip.value ? color_strip.value : '#000000';
            for (let y = 0; y + w <= sox_length.value; y += w * 2) {
                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', 0);
                rect.setAttribute('y', y);
                rect.setAttribute('width', 100);
                rect.setAttribute('height', w);
                rect.setAttribute('fill', fillColor);
                rect.setAttribute('mask', 'url(#stok)');
                rect.setAttribute('class', 'sox bkg stripC');
                bkgStripContainer.appendChild(rect);
            }
        }
        // 更新尖色块：使用装饰控制显隐，颜色→fill，高度→rect height，并更新“高度”显示
        function update_toe() {
            if (!svgval_toe) return;
            svgval_toe.setAttribute('visibility', deco_toe_switch && deco_toe_switch.checked ? 'visible' : 'hidden');
            svgval_toe.setAttribute('fill', deco_toe_color ? deco_toe_color.value : '#ffffff');

        // 更新顶部条纹开关（总开关打开时，各条纹按自身 checkbox 显隐；总开关关闭时全部隐藏）
        function update_strip_top_visibility() {
            const masterOn = deco_strip_top_switch && deco_strip_top_switch.checked;
            const pairs = [
                [deco_strip_top_1_enable, svgval_strip_top_1],
                [deco_strip_top_2_enable, svgval_strip_top_2],
                [deco_strip_top_3_enable, svgval_strip_top_3],
                [deco_strip_top_4_enable, svgval_strip_top_4]
            ];
            pairs.forEach(function (p) {
                const checkbox = p[0], rect = p[1];
                if (rect) rect.setAttribute('visibility', (masterOn && checkbox.checked) ? 'visible' : 'hidden');
            });
        }
        // 整体位移：开启时只允许调条纹1偏移，2/3/4 与条纹1保持相对位置
        function apply_strip_top_autopos() {
            const on = deco_strip_top_autopos && deco_strip_top_autopos.checked;
            deco_strip_top_2_offset.disabled = on;
            deco_strip_top_3_offset.disabled = on;
            deco_strip_top_4_offset.disabled = on;
            if (on) {
                const o1 = parseFloat(deco_strip_top_1_offset.value) || 0;
                // 首次开启或尚未有相对差时，从当前值捕获
                if (strip_top_offset_rel_2 === undefined) {
                    strip_top_offset_rel_2 = (parseFloat(deco_strip_top_2_offset.value) || 0) - o1;
                    strip_top_offset_rel_3 = (parseFloat(deco_strip_top_3_offset.value) || 0) - o1;
                    strip_top_offset_rel_4 = (parseFloat(deco_strip_top_4_offset.value) || 0) - o1;
                }
                deco_strip_top_2_offset.value = o1 + strip_top_offset_rel_2;
                deco_strip_top_3_offset.value = o1 + strip_top_offset_rel_3;
                deco_strip_top_4_offset.value = o1 + strip_top_offset_rel_4;
            } else {
                strip_top_offset_rel_2 = strip_top_offset_rel_3 = strip_top_offset_rel_4 = undefined;
            }
        }
        // 统一颜色：开启时禁用第2/3/4条纹颜色输入，并使其值与第1条纹一致
        function apply_strip_top_autocolor() {
            const on = deco_strip_top_autocolor && deco_strip_top_autocolor.checked;
            deco_strip_top_2_color.disabled = on;
            deco_strip_top_3_color.disabled = on;
            deco_strip_top_4_color.disabled = on;
            if (on) {
                deco_strip_top_2_color.value = deco_strip_top_1_color.value;
                deco_strip_top_3_color.value = deco_strip_top_1_color.value;
                deco_strip_top_4_color.value = deco_strip_top_1_color.value;

        }
        // 统一宽度：开启时禁用第2/3/4条纹宽度输入，并使其值与第1条纹一致
        function apply_strip_top_autoheight() {
            const on = deco_strip_top_autoheight && deco_strip_top_autoheight.checked;
            deco_strip_top_2_width.disabled = on;
            deco_strip_top_3_width.disabled = on;

        // 更新顶部条纹颜色（各条纹 fill 同步对应 color 输入）
        function update_strip_top_color() {
            const pairs = [
                [deco_strip_top_1_color, svgval_strip_top_1],
                [deco_strip_top_2_color, svgval_strip_top_2],
                [deco_strip_top_3_color, svgval_strip_top_3],
                [deco_strip_top_4_color, svgval_strip_top_4]
            ];
            pairs.forEach(function (p) {
                const colorInput = p[0], rect = p[1];
                if (colorInput && rect) rect.setAttribute('fill', colorInput.value);
            });
        }

        // 更新顶部条纹宽度和偏移：y = tmpval_sox_length - offset + width，height = width
        // 顶部条纹 y 与高度：y = sox_length - (偏移 + 宽度)，height = 宽度（由 sox_length=60 实验标定）
        function update_strip_top_width_and_offset() {
            const soxLen = parseFloat(sox_length.value) || 60;
            const pairs = [
                [deco_strip_top_1_offset, deco_strip_top_1_width, svgval_strip_top_1],
                [deco_strip_top_2_offset, deco_strip_top_2_width, svgval_strip_top_2],
                [deco_strip_top_3_offset, deco_strip_top_3_width, svgval_strip_top_3],
                [deco_strip_top_4_offset, deco_strip_top_4_width, svgval_strip_top_4]
            ];
            pairs.forEach(function (p) {
                const offsetInput = p[0], widthInput = p[1], rect = p[2];
                if (!rect) return;
                const offset = parseFloat(offsetInput.value) || 0;
                const width = parseFloat(widthInput.value) || 0;
                rect.setAttribute('y', soxLen - (offset + width));
                rect.setAttribute('height', width);
            });
        }
        // 脚印：拉取所选 SVG，内联 2 个图案到 stepContainer，中轴线分别 x=4、x=14，缩放以中心为锚点
        const STEP_PAW_SIZE = 6;   // step_paw 源尺寸
        const STEP_PAW_CENTER = STEP_PAW_SIZE / 2;  // 3，用于以中心为锚点缩放
        const STEP_CENTER_X1 = 4;
        const STEP_CENTER_X2 = 14;
        function update_deco_step() {
            if (!stepContainer) return;
            while (stepContainer.firstChild) stepContainer.removeChild(stepContainer.firstChild);
            if (!deco_step_switch || !deco_step_switch.checked) return;
            const scale = parseFloat(deco_step_scale && deco_step_scale.value) || 0.6;
            const offsetY = parseFloat(deco_step_offset_y && deco_step_offset_y.value) || 7;
            const color = deco_step_color && deco_step_color.value ? deco_step_color.value : '#ffc0cb';
            const fileName = 'sox/' + (deco_step_select && deco_step_select.value ? deco_step_select.value : 'step_paw.svg');
            function setFill(el, fillColor) {
                if (el.nodeType === 1) {
                    if (el.tagName === 'path' || el.tagName === 'circle' || el.tagName === 'rect' || el.tagName === 'polygon') el.setAttribute('fill', fillColor);
                    for (let j = 0; j < el.childNodes.length; j++) setFill(el.childNodes[j], fillColor);
                }
            }
            function makeWrapper(centerX) {
                var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('transform', 'translate(' + centerX + ',' + offsetY + ') scale(' + scale + ') translate(' + (-STEP_PAW_CENTER) + ',' + (-STEP_PAW_CENTER) + ')');
                return g;
            }
            fetch(fileName)
                .then(function (r) { return r.text(); })
                .then(function (svgText) {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(svgText, 'image/svg+xml');
                    const root = doc.documentElement;
                    if (!root || root.tagName !== 'svg') return;
                    [STEP_CENTER_X1, STEP_CENTER_X2].forEach(function (centerX) {
                        const wrapper = makeWrapper(centerX);
                        for (let i = 0; i < root.childNodes.length; i++) {
                            const node = root.childNodes[i];
                            wrapper.appendChild(document.importNode(node, true));
                        }
                        setFill(wrapper, color);
                        stepContainer.appendChild(wrapper);
                    });
                })
                .catch(function (err) { console.error('脚印 SVG 加载失败:', fileName, err); });
        }
        // 条纹偏移范围：max = sox_length，并将当前值钳位到 [0, max]
        function update_strip_offset_range() {
            const maxOffset = parseFloat(sox_length.value) || 60;
            const offsetInputs = [deco_strip_top_1_offset, deco_strip_top_2_offset, deco_strip_top_3_offset, deco_strip_top_4_offset];
            offsetInputs.forEach(function (input) {
                if (!input) return;
                input.setAttribute('max', maxOffset);
                const minVal = parseFloat(input.getAttribute('min')) || 0;
                const val = parseFloat(input.value) || 0;
                const clamped = Math.max(minVal, Math.min(maxOffset, val));
                if (clamped !== val) input.value = clamped;
            });
        }

                    if (config.conf_deco_strip_top_3_offset !== undefined) deco_strip_top_3_offset.value = config.conf_deco_strip_top_3_offset; // 顶部条纹3偏移
                    if (config.conf_deco_strip_top_4_offset !== undefined) deco_strip_top_4_offset.value = config.conf_deco_strip_top_4_offset; // 顶部条纹4偏移

                    update_deco_step();
                } catch (error) {
                    console.error('读取配置文件失败:', error);
                    alert('配置文件格式错误！');
                }
            };
            reader.readAsText(file);
        });

        // 重置
        resetBtn.addEventListener('click', function () {
            item_name.value = ''; // 配置名
            update_item_name();
            sox_length.value = 60; // sox长度
            update_sox_length();
            sox_model_panty.checked = false; // panty
            update_sox_model_panty();
            sox_model_tabi.checked = false; // tabi
            update_sox_model_tabi();
            color_single.value = '#ffffff'; // 纯色底色
            update_color_single();
            // 底纹条纹
            bkg_strip_switch.checked = false;
            color_strip.value = '#000000';
            color_strip_width.value = '5';
            update_bkg_strip();
            // 尖色块
            deco_toe_switch.checked = false;
            deco_toe_color.value = '#000000';
            deco_toe_height.value = '2';
            update_toe();
            // 顶部条纹
            deco_strip_top_switch.checked = false; // 顶部条纹总开关
            deco_strip_top_1_enable.checked = true; // 顶部条纹1开关
            deco_strip_top_2_enable.checked = true; // 顶部条纹2开关
            deco_strip_top_3_enable.checked = true; // 顶部条纹3开关
            deco_strip_top_4_enable.checked = false; // 顶部条纹4开关
            deco_strip_top_1_color.value = '#000000'; // 顶部条纹1颜色
            deco_strip_top_2_color.value = '#000000'; // 顶部条纹2颜色
            deco_strip_top_3_color.value = '#000000'; // 顶部条纹3颜色
            deco_strip_top_4_color.value = '#000000'; // 顶部条纹4颜色
            deco_strip_top_1_offset.value = '4'; // 顶部条纹1偏移
            deco_strip_top_2_offset.value = '6'; // 顶部条纹2偏移
            deco_strip_top_3_offset.value = '8'; // 顶部条纹3偏移
            deco_strip_top_4_offset.value = '10'; // 顶部条纹4偏移
            deco_strip_top_1_width.value = '1'; // 顶部条纹1宽度
            deco_strip_top_2_width.value = '1'; // 顶部条纹2宽度
            deco_strip_top_3_width.value = '1'; // 顶部条纹3宽度
            deco_strip_top_4_width.value = '1'; // 顶部条纹4宽度
            // 顶部条纹
            update_strip_top_visibility();
            update_strip_top_color();
            update_strip_top_width_and_offset();
            // 脚印
            deco_step_switch.checked = false;
            deco_step_select.value = 'step_paw.svg';
            deco_step_color.value = '#ffc0cb';
            deco_step_scale.value = '0.6';
            deco_step_offset_y.value = '7';
            if (disval_deco_step_scale) disval_deco_step_scale.textContent = '0.6';
            if (disval_deco_step_offset_y) disval_deco_step_offset_y.textContent = '7';
            update_deco_step();
        });

        // 保存SVG
        // 保存SVG到文件
        const saveSvgBtn = document.getElementById('saveSvgBtn');
        saveSvgBtn.addEventListener('click', function () {
            // 获取SVG元素的XML字符串
            const svgData = new XMLSerializer().serializeToString(document.getElementById('svgDisplay'));
            // 创建Blob对象
            const blob = new Blob([svgData], { type: "image/svg+xml" });
            // 创建下载链接
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            if (item_name.value == "") { item_name.value = "sox" }
            link.download = item_name.value + ".svg";
            // 触发下载
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            // 释放URL对象
            URL.revokeObjectURL(url);
        });
    </script>
</body>

</html>
