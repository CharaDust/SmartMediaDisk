<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mode 1</title>
    <!-- 引入 Bootstrap 5 CSS -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            padding: 20px;
        }
        .preview-section {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            min-height: 300px; /* 确保预览区域有足够高度 */
        }
        .number-display {
            text-align: center;
            font-weight: bold;
        }
        .control-section {
            padding: 20px;
        }
        .control-group {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container-fluid h-100">
    <h2 class="mb-4">Mode 1 - 数字控制</h2>

    <div class="row h-100">
        <!-- 左侧控制面板 -->
        <div class="col-md-6 control-section bg-light rounded">
            <h4>控制面板</h4>
            <div class="control-group">
                <label for="fontSizeInput" class="form-label">字体大小:</label><span id="fontSizeValue">30px</span>
                <input type="range" class="form-range" id="fontSizeInput" min="10" max="100" value="30">
                
            </div>
            <div class="control-group">
                <label for="colorPicker" class="form-label">文字颜色:</label>
                <input type="color" class="form-control form-control-color" id="colorPicker" value="#000000">
            </div>
        </div>

        <!-- 右侧预览区域 -->
        <div class="col-md-6 preview-section">
            <div id="numberDisplay" class="number-display" style="font-size: 30px; color: black;">5</div>
        </div>
    </div>
</div>

<script>
    const fontSizeInput = document.getElementById('fontSizeInput');
    const fontSizeValue = document.getElementById('fontSizeValue');
    const colorPicker = document.getElementById('colorPicker');
    const numberDisplay = document.getElementById('numberDisplay');

    // 更新字体大小显示和应用
    fontSizeInput.addEventListener('input', function() {
        const size = this.value + 'px';
        fontSizeValue.textContent = size;
        numberDisplay.style.fontSize = size;
    });

    // 更新颜色
    colorPicker.addEventListener('input', function() {
        numberDisplay.style.color = this.value;
    });
</script>

</body>
</html>
