        <title>底色</title>
        <!-- 纯色底色 -->
        <!-- fill   : @base_color -->
        <rect id="bkgSingleColor" class="sox bkg single" mask="url(#stok)" fill="white" height="150" width="100" y="0" x="0" visibility="visible"/>
        <!-- 渐变 -->
        <rect id="bkgGradColor" class="sox bkg grad" mask="url(#stok)" fill="white" height="150" width="100" y="0" x="0" visibility="hidden"/>
        <!-- 柏林纹理 -->
        <image id="bkgBerinColor" class="sox bkg berin" mask="url(#stok)" href="berin-mpr34fkyas.png" height="150" width="150" visibility="hidden"/>

    </g>
    <g>
