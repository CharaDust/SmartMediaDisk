<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <title>站长工具</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
        }

        .tool-frame-shell {
            height: calc(100vh - 56px);
            min-height: 480px;
        }

        .tool-frame {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>

<body>
    <!-- 导航栏 -->
    <!--# include virtual="/innerHTML/nav.html" -->
    <main class="tool-frame-shell">
        <iframe class="tool-frame" title="站长工具" referrerpolicy="no-referrer" data-tool-frame></iframe>
        <div class="container py-5 d-none" data-tool-message>
            <h1 class="h4">站长工具</h1>
            <p class="text-secondary mb-0">请选择一个站长工具。</p>
        </div>
    </main>
    <script>
        const toolSites = {
            bpm: {
                title: '音乐节奏测试',
                url: 'http://www.all8.com/tools/bpm.htm'
            },
            speedtest: {
                title: '网络速度测试',
                url: 'https://plugin.speedtest.cn/#/'
            },
            compumuseum: {
                title: '计算机博物馆',
                url: 'https://www.compumuseum.com/index.html'
            },
            'english-name': {
                title: '英文名生成',
                url: 'https://myingwenming.911cha.com/'
            },
            'english-signature': {
                title: '英文签字生成',
                url: 'https://www.uustv.com/yw.php'
            },
            'setting-generator': {
                title: '设定生成',
                url: 'https://shindanmaker.com/1059194'
            }
        };

        function loadToolSite() {
            const params = new URLSearchParams(window.location.search);
            const site = toolSites[params.get('site') || ''];
            const frame = document.querySelector('[data-tool-frame]');
            const message = document.querySelector('[data-tool-message]');

            if (!site || !frame || !message) {
                if (frame) {
                    frame.classList.add('d-none');
                }
                if (message) {
                    message.classList.remove('d-none');
                }
                return;
            }

            document.title = `${site.title} - 站长工具`;
            frame.title = site.title;
            frame.src = site.url;
        }

        document.addEventListener('DOMContentLoaded', loadToolSite);
    </script>
</body>

</html>
