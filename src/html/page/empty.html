<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <title>站长工具</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
        }

        .tool-frame-shell {
            height: calc(100vh - 56px);
            min-height: 480px;
        }

        .tool-frame {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>

<body>
    <!-- 导航栏 -->
    <!--# include virtual="/innerHTML/nav.html" -->
    <main class="tool-frame-shell">
        <iframe class="tool-frame" title="站长工具" referrerpolicy="no-referrer" data-tool-frame></iframe>
        <div class="container py-5 d-none" data-tool-message>
            <h1 class="h4">站长工具</h1>
            <p class="text-secondary mb-0">请选择一个站长工具。</p>
        </div>
    </main>
    <script src="/js/tool-frame.js"></script>
</body>

</html>
