<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>用户管理 - Media Cube</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            background: #f5f7fb;
        }

        .users-header {
            background: #172033;
            color: #f8fafc;
        }

        .user-meta {
            color: #64748b;
            font-size: 0.85rem;
        }

        .user-list-button {
            min-height: 4.25rem;
        }

        .account-value {
            font-weight: 600;
            overflow-wrap: anywhere;
        }
    </style>
</head>

<body>
    <!--# include virtual="/innerHTML/nav.html" -->

    <main>
        <section class="users-header py-4">
            <div class="container">
                <h1 class="h3 mb-1">用户管理</h1>
                <p class="mb-0 text-white-50">新增用户，维护用户资料，并跳转到权限管理页面。</p>
            </div>
        </section>

        <section class="container py-4">
            <div id="messageArea" class="alert d-none" role="status"></div>

            <div class="row g-4">
                <aside class="col-12 col-xl-4">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center">
                            <h2 class="h5 mb-0">用户列表</h2>
                            <span class="badge text-bg-secondary" id="userCount">0</span>
                        </div>
                        <div class="list-group list-group-flush" id="userList"></div>
                    </div>

                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center">
                            <h2 class="h5 mb-0">新增用户</h2>
                            <span class="badge" id="createPermissionBadge">检查中</span>
                        </div>
                        <div class="card-body">
                            <form id="createForm" novalidate>
                                <div class="mb-3">
                                    <label for="createUsername" class="form-label">用户名</label>
                                    <input type="text" class="form-control" id="createUsername" autocomplete="off" required
                                        disabled>
                                </div>
                                <div class="mb-3">
                                    <label for="createEmail" class="form-label">邮箱</label>
                                    <input type="email" class="form-control" id="createEmail" autocomplete="off" disabled>
                                </div>
                                <div class="mb-3">
                                    <label for="createPassword" class="form-label">初始密码</label>
                                    <input type="password" class="form-control" id="createPassword"
                                        autocomplete="new-password" required disabled>
                                </div>
                                <div class="mb-3">
                                    <label for="createQuotaValue" class="form-label">容量</label>
                                    <div class="input-group">
                                        <input type="number" class="form-control" id="createQuotaValue" min="0" step="0.01"
                                            placeholder="留空不限" disabled>
                                        <select class="form-select" id="createQuotaUnit" disabled>
                                            <option value="1048576" selected>MB</option>
                                            <option value="1073741824">GB</option>
                                            <option value="1099511627776">TB</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-check form-switch mb-3">
                                    <input class="form-check-input" type="checkbox" role="switch" id="createActive" checked
                                        disabled>
                                    <label class="form-check-label" for="createActive">启用账户</label>
                                </div>
                                <div class="d-grid">
                                    <button class="btn btn-success" type="submit" id="createSubmit" disabled>创建</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </aside>

                <section class="col-12 col-xl-8">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white d-flex flex-wrap gap-2 justify-content-between align-items-center">
                            <div>
                                <h2 class="h5 mb-1" id="detailTitle">用户资料</h2>
                                <div class="user-meta" id="detailSubtitle">未选择用户</div>
                            </div>
                            <div class="d-flex gap-2">
                                <span class="badge" id="updatePermissionBadge">检查中</span>
                                <span class="badge" id="deletePermissionBadge">检查中</span>
                            </div>
                        </div>
                        <div class="card-body">
                            <form id="detailForm" novalidate>
                                <div class="row g-3">
                                    <div class="col-12 col-lg-6">
                                        <label for="detailUsername" class="form-label">用户名</label>
                                        <input type="text" class="form-control" id="detailUsername" required disabled>
                                    </div>
                                    <div class="col-12 col-lg-6">
                                        <label for="detailEmail" class="form-label">邮箱</label>
                                        <input type="email" class="form-control" id="detailEmail" disabled>
                                    </div>
                                    <div class="col-12 col-lg-6">
                                        <label for="detailQuotaValue" class="form-label">容量</label>
                                        <div class="input-group">
                                            <input type="number" class="form-control" id="detailQuotaValue" min="0"
                                                step="0.01" disabled>
                                            <select class="form-select" id="detailQuotaUnit" disabled>
                                                <option value="1048576" selected>MB</option>
                                                <option value="1073741824">GB</option>
                                                <option value="1099511627776">TB</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-12 col-lg-6">
                                        <div class="form-check form-switch mt-lg-4 pt-lg-2">
                                            <input class="form-check-input" type="checkbox" role="switch"
                                                id="detailQuotaUnlimited" disabled>
                                            <label class="form-check-label" for="detailQuotaUnlimited">不限容量</label>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="d-flex flex-wrap gap-2">
                                            <span class="badge text-bg-secondary" id="rootBadge">root false</span>
                                            <span class="badge text-bg-secondary" id="activeBadge">active false</span>
                                            <span class="badge text-bg-secondary" id="staffBadge">staff false</span>
                                            <span class="badge text-bg-secondary" id="superuserBadge">superuser false</span>
                                        </div>
                                    </div>
                                    <div class="col-12 col-lg-6">
                                        <div class="user-meta">加入时间</div>
                                        <div class="account-value" id="dateJoined">-</div>
                                    </div>
                                    <div class="col-12 col-lg-6">
                                        <div class="user-meta">上次登录</div>
                                        <div class="account-value" id="lastLogin">-</div>
                                    </div>
                                    <div class="col-12 col-lg-6">
                                        <div class="user-meta">已用容量</div>
                                        <div class="account-value" id="storageUsed">-</div>
                                    </div>
                                    <div class="col-12 col-lg-6">
                                        <div class="user-meta">剩余容量</div>
                                        <div class="account-value" id="storageAvailable">-</div>
                                    </div>
                                    <div class="col-12">
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" role="switch" id="detailActive"
                                                disabled>
                                            <label class="form-check-label" for="detailActive">启用账户</label>
                                        </div>
                                    </div>
                                </div>

                                <div class="d-flex flex-wrap gap-2 mt-4">
                                    <button class="btn btn-primary" type="submit" id="detailSubmit" disabled>保存资料</button>
                                    <a class="btn btn-outline-secondary disabled" href="/permissions.html"
                                        id="permissionLink" aria-disabled="true">权限管理</a>
                                    <button class="btn btn-outline-danger" type="button" id="deleteButton" disabled>
                                        删除用户
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center">
                            <h2 class="h5 mb-0">重置密码</h2>
                            <span class="badge" id="passwordPermissionBadge">检查中</span>
                        </div>
                        <div class="card-body">
                            <form id="passwordForm" novalidate>
                                <label for="resetPassword" class="form-label">新密码</label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="resetPassword"
                                        autocomplete="new-password" required disabled>
                                    <button class="btn btn-primary" type="submit" id="passwordSubmit" disabled>
                                        重置
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </section>
            </div>
        </section>
    </main>

    <script src="/js/users.js"></script>
</body>

</html>
