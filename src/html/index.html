<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="bkgpic.css" rel="stylesheet">
    <link href="css/layout.css" rel="stylesheet">
    <title>Media Cube</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .resume-layout {
            align-items: flex-start;
        }

        .resume-sidebar {
            flex: 0 0 25%;
            max-width: 25%;
            min-width: 0;
        }

        .resume-content {
            flex: 0 0 75%;
            max-width: 75%;
            min-width: 0;
        }

        .resume-card {
            cursor: pointer;
            min-width: 0;
        }

        .resume-card-media {
            aspect-ratio: 16 / 9;
            max-width: 100%;
            overflow: hidden;
            width: 100%;
        }

        .resume-card-image {
            display: block;
            height: 100%;
            max-width: 100%;
            min-width: 0;
            object-fit: cover;
            width: 100%;
        }

        .resume-card-text {
            display: flex;
            gap: 0.25rem;
            min-width: 0;
            white-space: nowrap;
        }

        .resume-card-title {
            flex: 1 1 auto;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .home-strip {
            display: flex;
            flex-wrap: nowrap;
            gap: 0.75rem;
            overflow: hidden;
        }

        .home-strip-item {
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(15, 23, 42, 0.1);
            border-radius: 0.5rem;
            flex: 0 0 calc(var(--home-thumb-size, 6rem) + 0.7rem);
            padding: 0.35rem;
            position: relative;
            text-align: left;
        }

        .home-strip-button {
            appearance: none;
            background: transparent;
            border: 0;
            display: block;
            padding: 0;
            text-align: inherit;
            width: 100%;
        }

        .home-tool-link {
            color: inherit;
            text-decoration: none;
        }

        .home-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .home-tile-remove {
            align-items: center;
            background: rgba(15, 23, 42, 0.82);
            border: 0;
            border-radius: 999px;
            color: #fff;
            display: flex;
            height: 1.75rem;
            justify-content: center;
            left: 0.55rem;
            opacity: 0;
            pointer-events: none;
            position: absolute;
            top: 0.55rem;
            transition: opacity 120ms ease;
            width: 1.75rem;
            z-index: 2;
        }

        .home-strip-item:hover .home-tile-remove,
        .home-strip-item:focus-within .home-tile-remove {
            opacity: 1;
            pointer-events: auto;
        }

        .home-strip-thumb {
            align-items: center;
            aspect-ratio: 1 / 1;
            background: #f1f5f9;
            border-radius: 0.35rem;
            color: #64748b;
            display: flex;
            height: var(--home-thumb-size, 6rem);
            justify-content: center;
            overflow: hidden;
            width: var(--home-thumb-size, 6rem);
        }

        .home-strip-thumb img {
            display: block;
            height: 100%;
            object-fit: cover;
            width: 100%;
        }

        .home-strip-icon {
            font-size: 2rem;
        }

        .home-strip-title {
            display: block;
            font-size: 0.78rem;
            line-height: 1.25;
            margin-top: 0.35rem;
            max-width: calc(var(--home-thumb-size, 6rem) - 0.7rem);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .home-strip-empty {
            color: #64748b;
            font-size: 0.9rem;
            padding: 0.75rem 0;
        }

        .home-preview-frame {
            height: 70vh;
        }

        @media (max-width: 767.98px) {
            .resume-sidebar,
            .resume-content {
                flex-basis: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>

<body class="m-0 border-0 bd-example">

    <!-- 导航栏 -->
    <!--# include virtual="/innerHTML/nav.html" -->

    <!-- 正文 -->
    <div class="overlay fixed-top"></div>
    <div class="">
        <div class="container">
            <!-- 状态栏 -->
            <div class="status-bar navbar navbar-light">
                <div class="container-fluid d-flex justify-content-between align-items-center py-2">
                    <!-- 左侧：头像和用户名 -->
                    <div class="d-flex align-items-center">
                        <span style="width: 50px; height: 40px;">
                            <img src="https://picsum.photos/40/40?random=1" alt="头像" class="avatar rounded-circle">
                            <!-- 随机头像示例 -->
                        </span>
                        <span id="username">访客</span> <!-- 用户名将在这里显示 -->
                    </div>
                    <!-- 右侧：当前时间 -->
                    <span id="current-time">加载中...</span> <!-- 时间将在这里显示 -->
                </div>
            </div>
            <!-- 头部界面 -->
            <div class="container">
                <h2>Resume</h2>
                <!-- 左右布局 -->
                <div class="row resume-layout">
                    <div class="resume-sidebar">
                        <!-- 上一个内容 -->
                        <div class="">
                            <div class="card resume-card" style="width: 100%; margin-bottom: 10px;"
                                role="button" tabindex="0" data-resume-open>
                                <div class="resume-card-media">
                                    <img src="https://picsum.photos/1280/720"
                                        class="card-img-top resume-card-image" alt="上一个内容预览图" data-resume-image>
                                </div>
                                <div class="card-body">
                                    <p class="card-text resume-card-text mb-0">
                                        继续<span class="resume-card-title" data-resume-title>上一个内容</span>
                                    </p>
                                </div>
                            </div>
                        </div>
                        <!-- 按钮组 -->
                        <div class="">
                            <div class="container text-center">
                                <div class="row row-cols-2">
                                    <div class="col">
                                        <div class="d-grid gap-2">
                                            <button class="btn btn-dark" type="button">详情</button>
                                            <button class="btn btn-dark" type="button">文件</button>
                                        </div>
                                    </div>
                                    <div class="col">
                                        <div class="d-grid gap-2">
                                            <button class="btn btn-dark" type="button" data-resume-pin>收藏</button>
                                            <button class="btn btn-dark" type="button" data-resume-clear>终止</button>
                                        </div>
                                    </div>
                                    <div class="col">
                                    </div>
                                    <div class="col">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="resume-content d-sm-block">
                        <!-- 最近任务 -->
                        <div class="">
                            <h3>最近任务</h3>
                            <div class="home-strip" data-recent-strip>
                                <div class="home-strip-empty">暂无最近打开项目</div>
                            </div>
                        </div>
                        <!-- 推荐 -->
                        <div class="">
                            <h3>接下来</h3>
                            <div class="home-strip" data-random-strip>
                                <div class="home-strip-empty">正在加载...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="container m-4"></div>
            <!-- 已固定 -->
            <div class="container">
                <h2>已固定</h2>
                <div class="home-grid" data-pinned-grid>
                    <div class="home-strip-empty">暂无固定项目</div>
                </div>
            </div>
            <div class="container m-4"></div>
            <!-- 实用工具 -->
            <div class="container">
                <h2>实用工具</h2>
                <div class="home-grid" data-tools-grid>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="home-preview-modal" tabindex="-1" aria-labelledby="home-preview-title" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h2 class="modal-title fs-5" id="home-preview-title">文件预览</h2>
                        <div class="small text-secondary" id="home-preview-meta"></div>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body">
                    <pre class="bg-body-tertiary border rounded p-3 mb-0 overflow-auto" id="home-preview-text"><code id="home-preview-content"></code></pre>
                    <div class="text-center d-none" id="home-preview-image-wrap">
                        <img class="img-fluid rounded border" id="home-preview-image" alt="文件预览">
                    </div>
                    <div class="table-responsive d-none" id="home-preview-csv-wrap">
                        <table class="table table-sm table-striped table-hover align-middle mb-0">
                            <thead id="home-preview-csv-head"></thead>
                            <tbody id="home-preview-csv-body"></tbody>
                        </table>
                    </div>
                    <div class="d-none" id="home-preview-audio-wrap">
                        <audio class="w-100" id="home-preview-audio" controls preload="metadata"></audio>
                    </div>
                    <div class="d-none" id="home-preview-pdf-wrap">
                        <iframe class="w-100 border rounded home-preview-frame" id="home-preview-pdf" title="PDF 预览"></iframe>
                    </div>
                </div>
                <div class="modal-footer">
                    <a class="btn btn-outline-secondary" id="home-preview-download" href="#">
                        <i class="bi bi-download"></i>
                        下载
                    </a>
                    <button type="button" class="btn btn-dark" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/index-time.js"></script>
    <script src="/js/api/files.js"></script>
    <script src="/js/home-page.js?v=20260521-pinned-tools"></script>
</body>

</html>
