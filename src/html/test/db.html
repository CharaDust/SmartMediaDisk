<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <title>数据库测试页面</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <!-- 导航栏 -->
    <!--# include virtual="/innerHTML/nav.html" -->
    <div class="container">
        <h1>DB Test 数据展示</h1>
        <div class="controls">
            <button id="loadDataBtn" class="btn btn-outline-primary">刷新数据</button>
            <button id="createItemBtn" class="btn btn-outline-primary">新增条目</button>
            <button id="deleteAllBtn" class="btn btn-outline-danger">清空所有</button>
        </div>
        <div id="status"></div>
        <table id="data-table" class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Value</th>
                    <th>Created At</th>
                </tr>
            </thead>
            <tbody>
                <!-- 数据将在这里动态插入 -->
                <tr><td colspan="4" style="text-align:center;">点击 "刷新数据" 按钮加载数据</td></tr>
            </tbody>
        </table>
    </div>
    <script src="/js/db-test.js"></script>
</body>
</html>
