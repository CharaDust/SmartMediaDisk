<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>权限管理 - Media Cube</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            background: #f5f7fb;
        }

        .permission-shell {
            min-height: calc(100vh - 56px);
        }

        .editor-topbar {
            background: #172033;
            color: #f8fafc;
        }

        .editor-topbar .form-select,
        .editor-topbar .form-control {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .permission-row {
            border-bottom: 1px solid #e9edf5;
        }

        .permission-row:last-child {
            border-bottom: 0;
        }

        .permission-node-input {
            font-family: var(--bs-font-monospace);
            font-size: 0.9rem;
        }

        .permission-badge {
            width: 4.75rem;
        }

        .permission-state .btn {
            min-width: 4.25rem;
        }

        .permission-state .btn-check:checked + .btn-outline-success {
            color: #fff;
        }

        .permission-state .btn-check:checked + .btn-outline-danger {
            color: #fff;
        }

        .node-description {
            color: #64748b;
            font-size: 0.85rem;
        }

        .locked-row {
            background: #fff8e1;
        }
    </style>
</head>

<body>
    <!--# include virtual="/innerHTML/nav.html" -->

    <main class="permission-shell">
        <section class="editor-topbar py-3">
            <div class="container-fluid">
                <div class="row g-3 align-items-end">
                    <div class="col-12 col-lg-4">
                        <label for="userSelect" class="form-label">用户</label>
                        <select class="form-select" id="userSelect" disabled></select>
                    </div>
                    <div class="col-12 col-lg-5">
                        <label for="nodeInput" class="form-label">权限节点</label>
                        <input class="form-control permission-node-input" id="nodeInput" list="knownNodes"
                            placeholder="permissions.table.edit" autocomplete="off" disabled>
                        <datalist id="knownNodes"></datalist>
                    </div>
                    <div class="col-12 col-sm-6 col-lg-1 d-grid">
                        <button class="btn btn-success" id="addTrueButton" type="button" disabled>true</button>
                    </div>
                    <div class="col-12 col-sm-6 col-lg-1 d-grid">
                        <button class="btn btn-danger" id="addFalseButton" type="button" disabled>false</button>
                    </div>
                    <div class="col-12 col-lg-1 d-grid">
                        <button class="btn btn-primary" id="saveButton" type="button" disabled>保存</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="container-fluid py-4">
            <div class="row g-4">
                <aside class="col-12 col-xl-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white">
                            <div class="d-flex justify-content-between align-items-center">
                                <h1 class="h6 mb-0">对象</h1>
                                <span class="badge text-bg-secondary" id="userCount">0</span>
                            </div>
                        </div>
                        <div class="list-group list-group-flush" id="userList"></div>
                    </div>
                </aside>

                <section class="col-12 col-xl-9">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white">
                            <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center">
                                <div>
                                    <h2 class="h5 mb-1" id="editorTitle">权限</h2>
                                    <div class="text-muted small" id="editorSubtitle">未选择用户</div>
                                </div>
                                <div class="d-flex gap-2">
                                    <span class="badge rounded-pill text-bg-success" id="trueCount">true 0</span>
                                    <span class="badge rounded-pill text-bg-danger" id="falseCount">false 0</span>
                                    <span class="badge rounded-pill text-bg-warning" id="lockedCount">locked 0</span>
                                </div>
                            </div>
                        </div>
                        <div class="card-body p-0">
                            <div id="messageArea" class="alert m-3 d-none" role="status"></div>
                            <div id="permissionList"></div>
                        </div>
                    </div>
                </section>
            </div>
        </section>
    </main>


    <script src="/js/permissions.js"></script>
</body>

</html>
