<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>个人中心 - Media Cube</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            background: #f5f7fb;
        }

        .profile-header {
            background: #172033;
            color: #f8fafc;
        }

        .account-label {
            color: #64748b;
            font-size: 0.85rem;
        }

        .account-value {
            font-weight: 600;
            overflow-wrap: anywhere;
        }
    </style>
</head>

<body>
    <!--# include virtual="/innerHTML/nav.html" -->

    <main>
        <section class="profile-header py-4">
            <div class="container">
                <h1 class="h3 mb-1">个人中心</h1>
                <p class="mb-0 text-white-50">查看账户信息，并在拥有权限时修改登录凭据。</p>
            </div>
        </section>

        <section class="container py-4">
            <div id="messageArea" class="alert d-none" role="status"></div>

            <div class="row g-4">
                <section class="col-12 col-lg-5">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-header bg-white">
                            <h2 class="h5 mb-0">账户信息</h2>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <div class="account-label">用户 ID</div>
                                <div class="account-value" id="accountId">-</div>
                            </div>
                            <div class="mb-3">
                                <div class="account-label">用户名</div>
                                <div class="account-value" id="accountUsername">-</div>
                            </div>
                            <div class="mb-3">
                                <div class="account-label">邮箱</div>
                                <div class="account-value" id="accountEmail">-</div>
                            </div>
                            <div class="mb-3">
                                <div class="account-label">容量</div>
                                <div class="account-value" id="accountQuota">-</div>
                            </div>
                            <div class="mb-3">
                                <div class="account-label">已用 / 剩余</div>
                                <div class="account-value" id="accountStorageUsage">-</div>
                            </div>
                            <div class="mb-3">
                                <div class="account-label">角色标记</div>
                                <div class="d-flex gap-2 mt-1">
                                    <span class="badge text-bg-secondary" id="staffBadge">staff false</span>
                                    <span class="badge text-bg-secondary" id="superuserBadge">superuser false</span>
                                </div>
                            </div>
                            <div class="mb-3">
                                <div class="account-label">加入时间</div>
                                <div class="account-value" id="accountJoined">-</div>
                            </div>
                            <div>
                                <div class="account-label">上次登录</div>
                                <div class="account-value" id="accountLastLogin">-</div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="col-12 col-lg-7">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center">
                            <h2 class="h5 mb-0">修改用户名</h2>
                            <span class="badge" id="usernamePermissionBadge">检查中</span>
                        </div>
                        <div class="card-body">
                            <form id="usernameForm" novalidate>
                                <label for="newUsername" class="form-label">新用户名</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="newUsername" autocomplete="username"
                                        required disabled>
                                    <button class="btn btn-primary" type="submit" id="usernameSubmit" disabled>
                                        保存
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center">
                            <h2 class="h5 mb-0">更改导航栏标题</h2>
                            <span class="badge" id="navbarTitlePermissionBadge">检查中</span>
                        </div>
                        <div class="card-body">
                            <form id="navbarTitleForm" novalidate>
                                <label for="navbarTitle" class="form-label">导航栏标题</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="navbarTitle" maxlength="60"
                                        autocomplete="off" required disabled>
                                    <button class="btn btn-primary" type="submit" id="navbarTitleSubmit" disabled>
                                        保存
                                    </button>
                                </div>
                                <div class="form-text">默认值：Media Cube</div>
                            </form>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center">
                            <h2 class="h5 mb-0">修改密码</h2>
                            <span class="badge" id="passwordPermissionBadge">检查中</span>
                        </div>
                        <div class="card-body">
                            <form id="passwordForm" novalidate>
                                <div class="mb-3">
                                    <label for="oldPassword" class="form-label">旧密码</label>
                                    <input type="password" class="form-control" id="oldPassword"
                                        autocomplete="current-password" required disabled>
                                </div>
                                <div class="mb-3">
                                    <label for="newPassword" class="form-label">新密码</label>
                                    <input type="password" class="form-control" id="newPassword"
                                        autocomplete="new-password" required disabled>
                                </div>
                                <div class="d-grid">
                                    <button class="btn btn-primary" type="submit" id="passwordSubmit" disabled>
                                        保存并退出登录
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </section>
            </div>
        </section>
    </main>


    <script src="/js/profile.js"></script>
</body>

</html>
